spring.application.name=smart-revision-scheduler
server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:smart_revision_scheduler}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${MYSQLUSER:${MYSQL_USER:root}}
spring.datasource.password=${MYSQLPASSWORD:${MYSQL_PASSWORD:password}}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:http://localhost:5173}
app.auth.otp-expiry-minutes=${OTP_EXPIRY_MINUTES:10}
app.auth.token-expiry-days=${TOKEN_EXPIRY_DAYS:30}
app.auth.google-client-id=${GOOGLE_CLIENT_ID:}
app.mail.enabled=${MAIL_ENABLED:false}
app.upload.dir=${UPLOAD_DIR:uploads}

spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:25MB}

spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
